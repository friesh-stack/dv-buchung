var ftDates=[];for(var k in FT){ftDates.push(new Date(k+"T00:00:00").getTime());}
function isNearFT(date){var t=date.getTime(),d=864e5;for(var i=0;i<ftDates.length;i++){var diff=t-ftDates[i];if(diff>=-3*d&&diff<=1*d)return true;}return false;}
function getSeason(d){var m=d.getMonth()+1,dy=d.getDate(),y=d.getFullYear();if(y===2027&&m===1&&dy<=5)return"hau";if(m===12&&dy>=23)return"hau";if((m===6&&dy>=16)||m===7||m===8||(m===9&&dy<=14))return"hau";if(isNearFT(d))return"hau";if(m===5||(m===6&&dy<=15))return"neb";if((m===9&&dy>=15)||m===10)return"neb";return"off";}

function calcTotal(uid,von,bis){var dV=pd(von),dB=pd(bis),sum=0,d=new Date(dV);while(d<dB){sum+=getPrice(uid,d);d.setDate(d.getDate()+1);}return sum;}

function calcEditTotal(){
  var a=parseInt(document.getElementById("ed_accom").value)||0;
  var d=parseInt(document.getElementById("ed_dog").value)||0;
  var w=parseInt(document.getElementById("ed_waesche").value)||0;
  var r=parseInt(document.getElementById("ed_clean").value)||0;
  var total=a+d+w+r;
  document.getElementById("ed_total").value=total;
  // Also recalculate Anzahlung/Rest
  var anz=Math.round(total*0.5);

    var m=(CM+mi)%12,yr=CY+Math.floor((CM+mi)/12);
    h+='<div class="ml">'+MI[m]+' '+yr+'</div><div class="wr">';
    for(var i=0;i<7;i++)h+='<div class="wc '+WCC[i]+'">'+WL[i]+'</div>';
    h+='</div><div class="dg">';
    var fd=new Date(yr,m,1).getDay(),off=fd===0?6:fd-1;
    for(var x=0;x<off;x++)h+='<div class="dc em"></div>';
    var dim=new Date(yr,m+1,0).getDate();
    for(var day=1;day<=dim;day++){
      var date=new Date(yr,m,day),info=getInfo(uid,date),price=getPrice(uid,date);
      var dow=date.getDay(),key=dk(date),ft=FT[key]||null;
      var cls="dc";if(dow===6)cls+=" dsa";if(dow===0)cls+=" dso";if(ft)cls+=" dft";
      var wech=isWechsel(uid,date);
      if(wech.w){
        cls+=" xwech";
        var abT=wech.abAnf?"anf":"bk";
        var anT=wech.anAnf?"anf":"bk";
        cls+=" xwech-"+abT+"-"+anT;
      }
      var dn=DN[dow],tt=day+". "+MI[m]+" ("+dn+")";if(ft)tt+=" - "+ft;
      var ht=ft?'<span class="hd">'+ft+'</span>':"";
      var c="",onclick="";
      if(info.b){onclick=' onclick="showDetail(\''+uid+'\','+info.b._id+')"';}
      if(info.s==="xfr"){cls+=" xfr";tt+=" - "+price+" EUR";c='<span class="dn">'+day+'.</span><span class="pr">'+price+'<span class="eu">EUR</span></span>'+ht;freeDays++;}
      else if(info.s==="xar"||info.s==="xara"){cls+=" "+info.s;tt+=" - AN: "+info.g;c='<span class="dn">'+day+'.</span><span class="gn">'+info.g+'</span>'+ht;}
      else if(info.s==="xab"||info.s==="xaba"){cls+=" "+info.s;
        if(wech.w){tt+=" - AB:"+wech.abGast+" AN:"+wech.anGast;c='<span class="dn">'+day+'.</span><span class="gn" style="font-size:.38rem">'+wech.abGast.split(" ").pop()+"/"+wech.anGast.split(" ").pop()+'</span>'+ht;}
        else{tt+=" - AB: "+info.g;c='<span class="dn">'+day+'.</span><span class="gn">'+info.g+'</span>'+ht;}freeDays++;}
      else if(info.s==="xanf"){cls+=" xanf";tt+=" - ANFR: "+info.g;c='<span class="dn">'+day+'.</span><span class="gn">?'+info.g+'</span>'+ht;}
      else{cls+=" xbk";tt+=" - "+info.g;c='<span class="dn">'+day+'.</span><span class="gn">'+info.g+'</span>'+ht;}
      h+='<div class="'+cls+'" data-tooltip="'+tt+'"'+onclick+'>'+c+'</div>';
    }
    h+='</div>';
  }
  el.innerHTML=h;
  document.getElementById("st_"+uid).innerHTML='<strong>'+freeDays+'</strong> Tage frei';
}

function renderRP(){
  var all=[];
  UNITS.forEach(function(u){
    DATA[u.id].bookings.forEach(function(b){
      if(b.anfrage)return; // nur bestaetigte
      var abDate=pd(b.bis);
      if(abDate<TODAY)return;
      var twoMo=new Date(TODAY);twoMo.setMonth(twoMo.getMonth()+2);if(abDate>twoMo)return;
      // Find next booking for same unit
      var next=null;
      DATA[u.id].bookings.forEach(function(nb){
        if(nb._id===b._id||nb.anfrage)return;
        var nVon=pd(nb.von);
        if(nVon>=abDate){
          if(!next||nVon<pd(next.von))next=nb;
        }
      });
      var wechsel=false,tageZeit="";
      if(next&&sd(abDate,pd(next.von))){wechsel=true;tageZeit="WECHSEL (gleicher Tag!)";}
      else if(next){
        var diff=Math.round((pd(next.von)-abDate)/864e5);
        tageZeit=diff+" Tag(e) bis naechster Gast";
      }else{tageZeit="kein Folgegast";}
      all.push({unit:u.short,uid:u.id,gast:b.gast,abreise:b.bis,pers:b.pers||1,hunde:b.hunde||0,waesche:!!b.waesche,wechsel:wechsel,zeit:tageZeit,nextGast:next?next.gast:"-",nextAn:next?next.von:"",clean:u.clean});
    });
  });
  all.sort(function(a,b){return a.abreise<b.abreise?-1:1;});
  var el=document.getElementById("rpTable");
  if(!all.length){el.innerHTML="Keine anstehenden Reinigungen";return;}
  var h='<table><tr><th>Fewo</th><th>Abreise</th><th>Naechster Gast</th><th>Anreise</th><th>Waesche</th><th>Zeit</th><th>Anmerkung</th></tr>';
  all.forEach(function(r){
    var cls=r.wechsel?"pay-open":"";
    var wp=r.waesche?(r.pers+" Pakete"):"-";
    h+='<tr class="'+cls+'"><td><strong>'+r.unit+'</strong></td><td>'+fmt(r.abreise)+'</td>';
    h+='<td>'+(r.nextGast||"-")+'</td><td>'+(r.nextAn?fmt(r.nextAn):"-")+'</td>';
    h+='<td>'+wp+'</td>';
    h+='<td><strong>'+r.zeit+'</strong></td>';
    h+='<td><input type="text" style="width:120px;padding:2px 4px;border:1px solid #ddd;border-radius:3px;font-size:.72rem" placeholder="Anmerkung"></td></tr>';
  });
  h+='</table>';
  el.innerHTML=h;
  document.getElementById("rpStats").innerHTML=all.length+" Reinigungen anstehend";
}
